<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lilla Möllegård – Att göra</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #3B6D11;
    --green-light: #EAF3DE;
    --green-mid: #639922;
    --bg: #FAFAF7;
    --card: #FFFFFF;
    --text: #1a1a1a;
    --text-muted: #666;
    --border: #E5E5E0;
    --radius: 12px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  header { background: var(--green); padding: 1.25rem 1.5rem; }
  header h1 { color: #fff; font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
  header p { color: rgba(255,255,255,0.7); font-size: 13px; margin-top: 2px; }
  main { max-width: 600px; margin: 0 auto; padding: 1.25rem 1rem 4rem; }
  .add-box { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; margin-bottom: 1.25rem; }
  .add-box input { width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-size: 15px; color: var(--text); background: var(--bg); margin-bottom: 8px; outline: none; }
  .add-box input:focus { border-color: var(--green-mid); }
  .add-row { display: flex; gap: 8px; }
  .add-box select { flex: 1; border: 1px solid var(--border); border-radius: 8px; padding: 9px 10px; font-size: 14px; color: var(--text-muted); background: var(--bg); outline: none; }
  .add-box button { background: var(--green); color: #fff; border: none; border-radius: 8px; padding: 9px 18px; font-size: 14px; font-weight: 500; cursor: pointer; }
  .add-box button:active { opacity: 0.85; }
  .progress-wrap { margin-bottom: 1.25rem; }
  .progress-top { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
  .progress-bar-bg { height: 4px; background: var(--border); border-radius: 999px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--green); border-radius: 999px; transition: width 0.3s; }
  .tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
  .tab { padding: 5px 12px; border-radius: 999px; font-size: 13px; border: 1px solid var(--border); background: var(--card); color: var(--text-muted); cursor: pointer; }
  .tab.active { background: var(--green); color: #fff; border-color: var(--green); }
  .section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.05em; color: var(--text-muted); text-transform: uppercase; margin: 1.25rem 0 0.5rem; }
  .task-list { display: flex; flex-direction: column; gap: 6px; }
  .task { display: flex; align-items: center; gap: 10px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 11px 14px; transition: opacity 0.2s; }
  .task.done { opacity: 0.45; }
  .task.done .task-text { text-decoration: line-through; }
  .task input[type=checkbox] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--green); flex-shrink: 0; }
  .task-text { flex: 1; font-size: 14px; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; flex-shrink: 0; font-weight: 500; }
  .badge-kafe { background: #E1F5EE; color: #0F6E56; }
  .badge-kok { background: #FAEEDA; color: #854F0B; }
  .badge-tradgard { background: #EAF3DE; color: #3B6D11; }
  .badge-forsaljning { background: #E6F1FB; color: #185FA5; }
  .badge-ovrigt { background: #F1EFE8; color: #5F5E5A; }
  .del-btn { background: none; border: none; cursor: pointer; color: #ccc; font-size: 18px; padding: 0 2px; line-height: 1; }
  .del-btn:hover { color: #e24b4a; }
  .empty { text-align: center; padding: 2rem; color: var(--text-muted); font-size: 14px; }
  .syncing { position: fixed; bottom: 1rem; right: 1rem; background: var(--green); color: #fff; padding: 6px 14px; border-radius: 999px; font-size: 12px; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .syncing.show { opacity: 1; }
</style>
</head>
<body>
<header>
  <h1>🌸 Lilla Möllegård</h1>
  <p>Gårdsbutik · Att göra</p>
</header>
<main>
  <div class="add-box">
    <input type="text" id="newTask" placeholder="Ny uppgift..." />
    <div class="add-row">
      <select id="newCat">
        <option value="kafe">Kafé</option>
        <option value="kok">Kök</option>
        <option value="tradgard">Trädgård</option>
        <option value="forsaljning">Försäljning</option>
        <option value="ovrigt">Övrigt</option>
      </select>
      <button onclick="addTask()">+ Lägg till</button>
    </div>
  </div>
  <div class="progress-wrap">
    <div class="progress-top"><span id="progressText">Laddar...</span><span id="progressPct">0%</span></div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="task-list" id="taskList"></div>
  <div class="empty" id="emptyMsg" style="display:none">Inga uppgifter här! Lägg till en ovan.</div>
</main>
<div class="syncing" id="syncing">Sparar...</div>

<script>
const CATS = {
  kafe: { label: 'Kafé', badge: 'badge-kafe' },
  kok: { label: 'Kök', badge: 'badge-kok' },
  tradgard: { label: 'Trädgård', badge: 'badge-tradgard' },
  forsaljning: { label: 'Försäljning', badge: 'badge-forsaljning' },
  ovrigt: { label: 'Övrigt', badge: 'badge-ovrigt' }
};

let tasks = [];
let activeTab = 'alla';

function showSync() {
  const el = document.getElementById('syncing');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1500);
}

async function load() {
  try {
    const r = await fetch('/tasks');
    tasks = await r.json();
    render();
  } catch(e) { document.getElementById('progressText').textContent = 'Kunde inte ansluta'; }
}

async function addTask() {
  const input = document.getElementById('newTask');
  const cat = document.getElementById('newCat').value;
  const text = input.value.trim();
  if (!text) return;
  const r = await fetch('/tasks', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ text, cat, done: false }) });
  const task = await r.json();
  tasks.push(task);
  input.value = '';
  showSync();
  render();
}

async function toggleTask(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  t.done = !t.done;
  render();
  await fetch('/tasks/' + id, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ done: t.done }) });
  showSync();
}

async function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  render();
  await fetch('/tasks/' + id, { method: 'DELETE' });
  showSync();
}

document.getElementById('newTask').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

function render() {
  renderTabs();
  renderList();
  renderProgress();
}

function renderTabs() {
  const c = document.getElementById('tabs');
  const allCount = tasks.filter(t => !t.done).length;
  let html = `<button class="tab ${activeTab==='alla'?'active':''}" onclick="setTab('alla')">Alla (${allCount})</button>`;
  for (const [k, v] of Object.entries(CATS)) {
    const count = tasks.filter(t => t.cat === k && !t.done).length;
    html += `<button class="tab ${activeTab===k?'active':''}" onclick="setTab('${k}')">${v.label} (${count})</button>`;
  }
  c.innerHTML = html;
}

function renderList() {
  const list = document.getElementById('taskList');
  const empty = document.getElementById('emptyMsg');
  let filtered = activeTab === 'alla' ? tasks : tasks.filter(t => t.cat === activeTab);
  const todo = filtered.filter(t => !t.done);
  const done = filtered.filter(t => t.done);
  if (filtered.length === 0) { list.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  let html = '';
  if (todo.length) {
    html += todo.map(t => taskHTML(t)).join('');
  }
  if (done.length) {
    html += `<div class="section-label">Klara (${done.length})</div>`;
    html += done.map(t => taskHTML(t)).join('');
  }
  list.innerHTML = html;
}

function taskHTML(t) {
  return `<div class="task ${t.done?'done':''}">
    <input type="checkbox" ${t.done?'checked':''} onchange="toggleTask(${t.id})" />
    <span class="task-text">${t.text}</span>
    <span class="badge ${CATS[t.cat].badge}">${CATS[t.cat].label}</span>
    <button class="del-btn" onclick="deleteTask(${t.id})" title="Ta bort">×</button>
  </div>`;
}

function renderProgress() {
  const total = tasks.length;
  const done = tasks.filter(t => t.done).length;
  const pct = total === 0 ? 0 : Math.round((done / total) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${done} av ${total} klara`;
  document.getElementById('progressPct').textContent = pct + '%';
}

function setTab(tab) { activeTab = tab; render(); }

load();
setInterval(load, 30000);
</script>
</body>
</html>
